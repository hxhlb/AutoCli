<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px; color: #333; background: #fafafa;
      padding: 16px; min-height: 100vh;
    }
    .header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #eee;
    }
    .header img { width: 20px; height: 20px; }
    .header h1 { font-size: 14px; font-weight: 600; flex: 1; }
    .toolbar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .btn {
      padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px;
      background: #fff; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: all 0.15s;
    }
    .btn:hover { background: #f0f0f0; border-color: #ccc; }
    .btn.active { background: #4ecdc4; color: #fff; border-color: #4ecdc4; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      padding: 8px 12px; border-radius: 6px; background: #f0f4ff;
      font-size: 12px; color: #555; margin-bottom: 12px; line-height: 1.5;
    }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.warning { background: #fff3e0; color: #e65100; }
    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: #888; margin-bottom: 6px; letter-spacing: 0.5px;
    }
    .code-box {
      background: #1a1a2e; color: #e0e0e0;
      font: 12px/1.5 'SF Mono', Monaco, Consolas, monospace;
      padding: 8px 10px; border-radius: 6px; margin-bottom: 6px;
      word-break: break-all; position: relative; cursor: pointer;
    }
    .code-box:hover { background: #252545; }
    .code-box:active { background: #303060; }
    .code-box .label { color: #4ecdc4; font-weight: bold; margin-right: 6px; }
    .code-box .copied {
      position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
      color: #4ecdc4; font-size: 11px; display: none;
    }
    .match-count { font-size: 11px; color: #4ecdc4; font-weight: bold; }
    .field-item {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      background: #fff; border: 1px solid #eee; border-radius: 6px;
      margin-bottom: 4px; font-size: 12px; cursor: pointer;
    }
    .field-item:hover { background: #f5f5f5; }
    .field-name { font-weight: 600; min-width: 50px; }
    .field-selector {
      font-family: monospace; color: #666; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .field-type {
      font-size: 10px; padding: 1px 6px; border-radius: 10px;
      background: #e8ecf1; color: #555;
    }
    .export-area {
      background: #1a1a2e; color: #e0e0e0; font: 11px/1.4 monospace;
      padding: 10px; border-radius: 6px; max-height: 250px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .help { font-size: 11px; color: #999; line-height: 1.5; margin-top: 10px; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 6px 16px; border-radius: 20px;
      font-size: 12px; display: none; z-index: 999;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-48.png" alt="">
    <h1>Selector Tool</h1>
  </div>

  <div class="toolbar">
    <button class="btn" id="btn-blocks">🎨 Blocks</button>
    <button class="btn" id="btn-pick">🎯 Pick</button>
    <button class="btn" id="btn-fields" disabled>📋 Fields</button>
    <button class="btn" id="btn-stop">⏹ Stop</button>
  </div>

  <div class="status" id="status">
    Click <b>🎯 Pick</b> to select list elements. Pick 2+ similar items to detect the pattern.
  </div>

  <div class="section" id="sec-list" style="display:none;">
    <div class="section-title">List Pattern (click to copy)</div>
    <div class="code-box" id="box-css" title="Click to copy">
      <span class="label">CSS</span><span id="list-css"></span>
      <span class="copied">✓ Copied</span>
    </div>
    <div class="match-count" id="list-count"></div>
  </div>

  <div class="section" id="sec-fields" style="display:none;">
    <div class="section-title">Fields (click to copy selector)</div>
    <div id="fields-list"></div>
  </div>

  <div class="section" id="sec-export" style="display:none;">
    <div class="section-title">Export</div>
    <div class="toolbar">
      <button class="btn" id="btn-copy-json">📋 JSON</button>
      <button class="btn" id="btn-copy-yaml">📋 YAML</button>
    </div>
    <div class="export-area" id="export-content"></div>
  </div>

  <div class="help">
    <b>Esc</b> to stop · Click code boxes to copy
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script src="panel.js"></script>
</body>
</html>
